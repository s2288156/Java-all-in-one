server:
  port: 28081

spring:
  application:
    name: auth-service
  config:
    import: nacos:auth-service.yml
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: public
      config:
        server-addr: 127.0.0.1:8848
        namespace: public
        file-extension: yml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

keycloak:
  server-url: ${KEYCLOAK_SERVER_URL:http://192.168.50.17:18080}
  realm: ${KEYCLOAK_REALM:master}
  client-id: ${KEYCLOAK_CLIENT_ID:auth-service}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:auth-service-secret}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:auth-service}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:auth-service-secret}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

user-service:
  url: ${USER_SERVICE_URL:http://localhost:28082}
